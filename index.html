<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="https://fptranscargas.com.br/imags/favicon.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Preconnect para recursos externos críticos -->
    <link rel="preconnect" href="https://fptranscargas.com.br" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- DNS Prefetch para APIs e recursos -->
    <link rel="dns-prefetch" href="https://kong.fptranscargas.com.br">
    <link rel="dns-prefetch" href="https://api.fptranscargas.com.br">
    
    <!-- Preload da imagem LCP (hero) - crítico para performance -->
    <link rel="preload" as="image" href="https://fptranscargas.com.br/imags/fundo.png" fetchpriority="high">
    
    <!-- Preload de fontes críticas -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap"></noscript>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="FP Transcargas - Soluções completas em transporte e logística com segurança e eficiência" />
    <meta name="keywords" content="transporte, logística, carga, frota, rastreamento" />
    <meta name="author" content="FP Transcargas" />
    
    <!-- Security Headers -->
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=()" />
    
   <!-- Content Security Policy -->
<meta http-equiv="Content-Security-Policy" 
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval'
            https://lovableprojects.s3.amazonaws.com 
            https://cdn.gpteng.co 
            https://www.googletagmanager.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        img-src 'self' data: https: blob:;
        font-src 'self' data: https://fonts.gstatic.com;
        media-src 'self' https://kong.fptranscargas.com.br https://lookaside.fbsbx.com https://*.fbsbx.com blob: data:;
        connect-src 'self'
            https://kong.fptranscargas.com.br
            http://kong.fptranscargas.com.br
            wss://kong.fptranscargas.com.br
            https://n8n.fptranscargas.com.br
            https://api.fptranscargas.com.br
            https://api.ipify.org
            https://open.cnpja.com
            https://graph.facebook.com
            https://lookaside.fbsbx.com
            https://*.fbsbx.com
            https://brasilapi.com.br;
        frame-src 'self' blob: https://kong.fptranscargas.com.br https://www.google.com;
        object-src 'none';
        base-uri 'self';
        form-action 'self';
      " />

    <title>FP Transcargas - Transporte e Logística Segura</title>
    
    <!-- Critical CSS inline para evitar FOUC -->
    <style>
      /* Critical CSS - Loader inicial */
      body { margin: 0; font-family: Inter, system-ui, sans-serif; }
      #root { min-height: 100vh; }
      .initial-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #fff;
      }
      .initial-loader .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #e5e7eb;
        border-top-color: #2563eb;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
